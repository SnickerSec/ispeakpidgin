<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talk Story with Kimo - Your Pidgin AI Tutor | ChokePidgin.com</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="Practice your Hawaiian Pidgin in real-time with Kimo, our friendly AI tutor. Talk story, get corrections, and learn authentic local expressions in a safe environment.">
    <meta name="keywords" content="Pidgin tutor, learn Hawaiian Pidgin, talk story AI, Hawaii language practice, Pidgin conversation, interactive Pidgin learning">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Talk Story with Kimo - Your Pidgin AI Tutor">
    <meta property="og:description" content="Practice your Hawaiian Pidgin in real-time with our friendly AI tutor.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://chokepidgin.com/talk-story.html">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link href="css/tailwind.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">

    <style>
        .brand-font { font-family: 'Pacifico', cursive; }
        body { font-family: 'Inter', sans-serif; }
        
        .chat-container {
            height: calc(100vh - 200px);
            max-height: 600px;
        }
        
        .message-bubble {
            max-width: 85%;
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background-color: #94a3b8;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        .gradient-bg {
            background: linear-gradient(135deg, #60a5fa 0%, #a855f7 100%);
        }
    </style>
</head>
<body class="bg-blue-50 min-h-screen flex flex-col">
    <!-- NAVIGATION_PLACEHOLDER -->

    <main class="flex-grow container mx-auto px-4 py-6 max-w-4xl">
        <!-- Header -->
        <div class="bg-white rounded-2xl p-6 mb-6 shadow-md border-b-4 border-blue-400">
            <div class="flex flex-col md:flex-row items-center gap-6 mb-6">
                <div id="character-avatar" class="w-20 h-20 rounded-full gradient-bg flex items-center justify-center text-white text-4xl shadow-inner border-4 border-white transition-all duration-500">
                    <i class="ti ti-user-smile"></i>
                </div>
                <div class="text-center md:text-left flex-grow">
                    <h1 id="character-name" class="text-2xl md:text-3xl font-bold text-gray-800 mb-1">Talk Story wit' Kimo</h1>
                    <p id="character-desc" class="text-gray-600 text-sm md:text-base">Your friendly AI Pidgin tutor. Just chat like you stay beach!</p>
                </div>
                <div class="flex flex-col items-end gap-2">
                    <div class="flex gap-2">
                        <button id="clear-chat" class="p-2 text-gray-400 hover:text-red-500 transition-colors" title="Clear Chat">
                            <i class="ti ti-trash text-2xl"></i>
                        </button>
                    </div>
                    <label class="flex items-center cursor-pointer gap-2" title="Automatically play AI voice response">
                        <span class="text-xs font-bold text-gray-400 uppercase">Auto-Voice</span>
                        <div class="relative">
                            <input type="checkbox" id="auto-voice" class="sr-only peer" checked>
                            <div class="w-10 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-500"></div>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Character Selection -->
            <div class="grid grid-cols-3 gap-3">
                <button data-char="kimo" class="char-btn active border-2 border-blue-400 bg-blue-50 p-2 rounded-xl flex flex-col items-center transition-all">
                    <span class="text-xl">👨🏽‍🏫</span>
                    <span class="text-xs font-bold mt-1">Kimo</span>
                </button>
                <button data-char="aunty" class="char-btn border-2 border-transparent bg-gray-50 p-2 rounded-xl flex flex-col items-center transition-all hover:bg-purple-50 hover:border-purple-200">
                    <span class="text-xl">👵🏽</span>
                    <span class="text-xs font-bold mt-1">Aunty</span>
                </button>
                <button data-char="braddah" class="char-btn border-2 border-transparent bg-gray-50 p-2 rounded-xl flex flex-col items-center transition-all hover:bg-orange-50 hover:border-orange-200">
                    <span class="text-xl">🤙🏽</span>
                    <span class="text-xs font-bold mt-1">Braddah</span>
                </button>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="bg-white rounded-2xl shadow-xl border border-blue-100 flex flex-col overflow-hidden">
            <!-- Messages -->
            <div id="chat-messages" class="chat-container overflow-y-auto p-4 md:p-6 space-y-4 bg-gray-50/50">
                <!-- Welcome Message -->
                <div class="flex justify-start">
                    <div class="message-bubble bg-white border border-blue-100 rounded-2xl rounded-tl-none p-4 shadow-sm">
                        <p class="text-gray-800 font-medium">Aloha! I stay Kimo. Like talk story? I can help you practice your Pidgin. Just type someting below!</p>
                        <div class="mt-2 text-xs text-blue-500 italic">Kimo stays active</div>
                    </div>
                </div>
            </div>

            <!-- Typing Indicator (hidden by default) -->
            <div id="typing-indicator" class="hidden px-6 py-2">
                <div class="typing-indicator flex gap-1">
                    <span></span><span></span><span></span>
                </div>
            </div>

            <!-- Input Area -->
            <div class="p-4 bg-white border-t border-gray-100">
                <form id="chat-form" class="flex gap-2">
                    <input type="text" id="user-input" 
                        class="flex-grow px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-400 focus:outline-none transition-all"
                        placeholder="Type here..." autocomplete="off">
                    <button type="submit" id="send-btn" 
                        class="gradient-bg text-white w-12 h-12 rounded-xl flex items-center justify-center hover:scale-105 active:scale-95 transition-all shadow-lg">
                        <i class="ti ti-send text-xl"></i>
                    </button>
                </form>
                <p class="text-[10px] text-gray-400 mt-2 text-center">Kimo is an AI and can make mistakes. Always check da dictionary for fo' real rules!</p>
            </div>
        </div>
    </main>

    <!-- FOOTER_PLACEHOLDER -->

    <!-- Scripts -->
    <script src="js/components/elevenlabs-speech.js"></script>
    <script src="js/components/speech.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const chatMessages = document.getElementById('chat-messages');
            const chatForm = document.getElementById('chat-form');
            const userInput = document.getElementById('user-input');
            const typingIndicator = document.getElementById('typing-indicator');
            const clearChatBtn = document.getElementById('clear-chat');
            const charButtons = document.querySelectorAll('.char-btn');
            const autoVoiceCheck = document.getElementById('auto-voice');
            
            const characterProfiles = {
                kimo: {
                    name: "Talk Story wit' Kimo",
                    desc: "Your friendly AI Pidgin tutor. Just chat like you stay beach!",
                    icon: "ti-user-smile",
                    color: "linear-gradient(135deg, #60a5fa 0%, #a855f7 100%)",
                    accent: "border-blue-400",
                    bg: "bg-blue-50",
                    voiceId: "f0ODjLMfcJmlKfs7dFCW"
                },
                aunty: {
                    name: "Talk Story wit' Aunty Leilani",
                    desc: "Warm, wise, and a little bit sassy. Like talking to your favorite Tutu.",
                    icon: "ti-woman",
                    color: "linear-gradient(135deg, #f472b6 0%, #db2777 100%)",
                    accent: "border-purple-400",
                    bg: "bg-purple-50",
                    voiceId: "EXAVITQu4vr4xnSDxMaL"
                },
                braddah: {
                    name: "Talk Story wit' Shane",
                    desc: "Super casual surfer braddah. Chee-hoo! Rajah dat!",
                    icon: "ti-mood-smile-beam",
                    color: "linear-gradient(135deg, #fbbf24 0%, #ea580c 100%)",
                    accent: "border-orange-400",
                    bg: "bg-orange-50",
                    voiceId: "ErXwbc3VNbCc1k9An9bS"
                }
            };

            let currentCharacter = 'kimo';
            let messageHistory = [];

            // Character switching logic
            charButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const char = btn.dataset.char;
                    if (char === currentCharacter) return;

                    // Update UI
                    charButtons.forEach(b => {
                        b.classList.remove('active', 'border-blue-400', 'border-purple-400', 'border-orange-400', 'bg-blue-50', 'bg-purple-50', 'bg-orange-50');
                        b.classList.add('border-transparent', 'bg-gray-50');
                    });

                    const profile = characterProfiles[char];
                    btn.classList.remove('border-transparent', 'bg-gray-50');
                    btn.classList.add('active', profile.accent, profile.bg);

                    // Update header
                    document.getElementById('character-name').textContent = profile.name;
                    document.getElementById('character-desc').textContent = profile.desc;
                    const avatar = document.getElementById('character-avatar');
                    avatar.style.background = profile.color;
                    avatar.innerHTML = `<i class="ti ${profile.icon}"></i>`;
                    
                    document.querySelector('main > div:first-child').className = `bg-white rounded-2xl p-6 mb-6 shadow-md border-b-4 ${profile.accent}`;

                    currentCharacter = char;
                    
                    // Reset chat for new character
                    chatMessages.innerHTML = '';
                    messageHistory = [];
                    const welcomeMsg = char === 'kimo' ? "Aloha! I stay Kimo. Like talk story?" : 
                                     char === 'aunty' ? "Aloha my keiki! Come, sit, talk story with Aunty." :
                                     "Eh aloha! I Shane. Wassup brah? Ready for talk story?";
                    addMessage('model', welcomeMsg, { character: char });
                });
            });

            function addMessage(role, content, data = null) {
                const isUser = role === 'user';
                const div = document.createElement('div');
                div.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
                
                let innerHTML = '';
                if (isUser) {
                    innerHTML = `
                        <div class="message-bubble gradient-bg text-white rounded-2xl rounded-tr-none p-4 shadow-md">
                            <p class="font-medium">${escapeHtml(content)}</p>
                        </div>
                    `;
                } else {
                    const { pidgin, translation, hint, voiceId } = data || { pidgin: content };
                    const char = data?.character || currentCharacter;
                    const profile = characterProfiles[char] || characterProfiles.kimo;
                    const safePidgin = pidgin || '';

                    innerHTML = `
                        <div class="message-bubble bg-white border border-blue-100 rounded-2xl rounded-tl-none p-4 shadow-sm">
                            <div class="flex justify-between items-start gap-4 mb-1">
                                <p class="text-gray-800 font-bold text-lg">${escapeHtml(safePidgin)}</p>
                                <button class="speak-btn text-blue-400 hover:text-blue-600 transition-colors"
                                        data-text="${safePidgin.replace(/"/g, '&quot;')}"
                                        data-voice="${voiceId || profile.voiceId}">
                                    <i class="ti ti-volume text-xl"></i>
                                </button>
                            </div>                            ${translation ? `<p class="text-gray-500 text-sm border-t border-gray-50 pt-2 mt-2 italic">${escapeHtml(translation)}</p>` : ''}
                            ${hint ? `
                                <div class="mt-3 bg-amber-50 rounded-lg p-2 border-l-2 border-amber-400 flex gap-2 items-start">
                                    <i class="ti ti-bulb text-amber-500 mt-0.5"></i>
                                    <p class="text-amber-800 text-xs">${escapeHtml(hint)}</p>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }
                
                div.innerHTML = innerHTML;
                chatMessages.appendChild(div);
                chatMessages.scrollTop = chatMessages.scrollHeight;

                // Add to history
                messageHistory.push({ role, content: isUser ? content : (data?.pidgin || content) });
                if (messageHistory.length > 10) messageHistory.shift();

                // Attach audio listeners and auto-play
                if (!isUser) {
                    const btn = div.querySelector('.speak-btn');
                    const playVoice = () => {
                        if (window.elevenLabsSpeech) {
                            window.elevenLabsSpeech.speak(btn.dataset.text, { voiceId: btn.dataset.voice });
                        } else if (window.pidginSpeech) {
                            window.pidginSpeech.speak(btn.dataset.text);
                        }
                    };

                    btn?.addEventListener('click', playVoice);

                    // Auto-play if enabled
                    if (autoVoiceCheck.checked && data) {
                        setTimeout(playVoice, 500);
                    }
                }
            }

            chatForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const message = userInput.value.trim();
                if (!message) return;

                userInput.value = '';
                userInput.disabled = true;
                addMessage('user', message);
                
                typingIndicator.classList.remove('hidden');
                chatMessages.scrollTop = chatMessages.scrollHeight;

                try {
                    const response = await fetch('/api/ai/talk-story', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            message, 
                            history: messageHistory.slice(0, -1),
                            character: currentCharacter
                        })
                    });

                    const data = await response.json();
                    typingIndicator.classList.add('hidden');
                    
                    if (data.error) {
                        addMessage('model', "Sorry brah, my brain wen stay freeze for one second. Try again bumbye.");
                    } else {
                        addMessage('model', data.pidgin, data);
                    }
                } catch (err) {
                    typingIndicator.classList.add('hidden');
                    addMessage('model', "Eh, looks like da kine network stay acting up. Try refresh!");
                } finally {
                    userInput.disabled = false;
                    userInput.focus();
                }
            });

            clearChatBtn.addEventListener('click', () => {
                if (confirm('Clear our conversation, brah?')) {
                    chatMessages.innerHTML = '';
                    messageHistory = [];
                    const profile = characterProfiles[currentCharacter];
                    const welcomeMsg = currentCharacter === 'kimo' ? "Aloha! I stay Kimo. Like talk story?" : 
                                     currentCharacter === 'aunty' ? "Aloha my keiki! Come, sit, talk story with Aunty." :
                                     "Eh aloha! I Shane. Wassup brah? Ready for talk story?";
                    addMessage('model', welcomeMsg, { character: currentCharacter });
                }
            });

            function escapeHtml(text) {
                if (!text) return '';
                return String(text)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }
        });
    </script>
</body>
</html>
