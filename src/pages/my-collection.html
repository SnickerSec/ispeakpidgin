<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Collection - Saved Words & Phrases | ChokePidgin</title>
    <meta name="description" content="View and manage your personal collection of saved Hawaiian Pidgin words and phrases.">
    <link rel="canonical" href="https://chokepidgin.com/my-collection.html">
    
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="css/tailwind.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        .brand-font { font-family: 'Pacifico', cursive; }
        .hero-gradient { background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- NAVIGATION_PLACEHOLDER -->

    <div class="hero-gradient py-12 px-4 text-white">
        <div class="max-w-4xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
            <div>
                <h1 class="text-4xl font-extrabold mb-2">My Collection</h1>
                <p class="text-blue-50">Your personal library of saved Pidgin words and phrases.</p>
            </div>
            <div class="flex flex-col items-end gap-3">
                <div id="user-info" class="bg-white/10 backdrop-blur-md px-6 py-4 rounded-2xl border border-white/20 min-w-[280px]">
                    <!-- Populated by JS -->
                </div>
                <button id="clear-all-btn" class="hidden text-xs text-blue-100 hover:text-white transition flex items-center gap-1">
                    <i class="ti ti-trash"></i> Clear All Saved Words
                </button>
            </div>
        </div>
    </div>

    <main class="max-w-6xl mx-auto px-4 py-12">
        <!-- Gamification Section -->
        <div id="gamification-section" class="mb-12 hidden">
            <h2 class="text-2xl font-black text-gray-800 mb-6 flex items-center gap-2">
                <i class="ti ti-medal text-yellow-500"></i> My Achievements
            </h2>
            <div id="badges-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
                <!-- Badges go here -->
            </div>
        </div>

        <h2 class="text-2xl font-black text-gray-800 mb-6">Saved Words</h2>
        <div id="favorites-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Loading State -->
            <div class="col-span-full text-center py-20 text-gray-400">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent mb-4"></div>
                <p class="text-xl">Loading your collection...</p>
            </div>
        </div>

        <div id="empty-state" class="hidden text-center py-20">
            <div class="text-6xl mb-4">📚</div>
            <h3 class="text-2xl font-bold text-gray-800 mb-2">Your collection is empty</h3>
            <p class="text-gray-600 mb-8">Start exploring the dictionary and click the heart icon to save words!</p>
            <a href="/dictionary.html" class="inline-block bg-blue-600 text-white px-8 py-3 rounded-full font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200">
                Browse Dictionary
            </a>
        </div>
    </main>

    <!-- FOOTER_PLACEHOLDER -->

    <script src="js/main.js" defer></script>
    <script src="/js/components/my-collection-page.js" defer></script>
</body>
</html>
