<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - ChokePidgin</title>
    <meta name="description" content="Sign in to your ChokePidgin account to manage your collection and track your progress.">
    <link rel="canonical" href="https://chokepidgin.com/login.html">
    
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="css/tailwind.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        .brand-font { font-family: 'Pacifico', cursive; }
        .hero-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- NAVIGATION_PLACEHOLDER -->

    <main class="max-w-md mx-auto px-4 py-20">
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
            <!-- Tab Headers -->
            <div class="flex border-b">
                <button id="tab-login" class="flex-1 py-4 text-center font-bold text-blue-600 border-b-2 border-blue-600">Login</button>
                <button id="tab-register" class="flex-1 py-4 text-center font-bold text-gray-400 border-b-2 border-transparent hover:text-gray-600 transition">Register</button>
            </div>

            <div class="p-8">
                <!-- Login Form -->
                <form id="login-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Email Address</label>
                        <input type="email" id="login-email" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-4 focus:ring-blue-50 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Password</label>
                        <input type="password" id="login-password" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-4 focus:ring-blue-50 outline-none transition">
                    </div>
                    <button type="submit" id="login-btn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200">
                        Sign In
                    </button>
                </form>

                <!-- Register Form (Hidden) -->
                <form id="register-form" class="space-y-4 hidden">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Display Name</label>
                        <input type="text" id="reg-name" required placeholder="Local Legend" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-4 focus:ring-blue-50 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Email Address</label>
                        <input type="email" id="reg-email" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-4 focus:ring-blue-50 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Password</label>
                        <input type="password" id="reg-password" required minlength="6" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-4 focus:ring-blue-50 outline-none transition">
                    </div>
                    <button type="submit" id="register-btn" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold hover:bg-green-700 transition shadow-lg shadow-green-200">
                        Create Account
                    </button>
                </form>

                <div id="auth-error" class="hidden mt-4 p-3 bg-red-50 text-red-600 text-sm rounded-lg text-center font-medium"></div>
            </div>
        </div>

        <p class="text-center text-gray-400 text-xs mt-8">
            By signing in, you can sync your bookmarked words across all your devices.
        </p>
    </main>

    <!-- FOOTER_PLACEHOLDER -->

    <script src="js/main.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginTab = document.getElementById('tab-login');
            const regTab = document.getElementById('tab-register');
            const loginForm = document.getElementById('login-form');
            const regForm = document.getElementById('register-form');
            const authError = document.getElementById('auth-error');

            const switchTab = (isLogin) => {
                if (isLogin) {
                    loginTab.classList.add('text-blue-600', 'border-blue-600');
                    loginTab.classList.remove('text-gray-400', 'border-transparent');
                    regTab.classList.add('text-gray-400', 'border-transparent');
                    regTab.classList.remove('text-blue-600', 'border-blue-600');
                    loginForm.classList.remove('hidden');
                    regForm.classList.add('hidden');
                } else {
                    regTab.classList.add('text-blue-600', 'border-blue-600');
                    regTab.classList.remove('text-gray-400', 'border-transparent');
                    loginTab.classList.add('text-gray-400', 'border-transparent');
                    loginTab.classList.remove('text-blue-600', 'border-blue-600');
                    regForm.classList.remove('hidden');
                    loginForm.classList.add('hidden');
                }
                authError.classList.add('hidden');
            };

            loginTab.addEventListener('click', () => switchTab(true));
            regTab.addEventListener('click', () => switchTab(false));

            // Handle Login
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('login-btn');
                btn.disabled = true;
                btn.textContent = 'Signing in...';
                authError.classList.add('hidden');

                try {
                    await window.UserAuth.login(
                        document.getElementById('login-email').value,
                        document.getElementById('login-password').value
                    );
                    // Sync favorites immediately after login
                    if (window.favoritesManager) await window.favoritesManager.syncFromCloud();
                    window.location.href = '/my-collection.html';
                } catch (err) {
                    authError.textContent = err.message;
                    authError.classList.remove('hidden');
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                }
            });

            // Handle Register
            regForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('register-btn');
                btn.disabled = true;
                btn.textContent = 'Creating account...';
                authError.classList.add('hidden');

                try {
                    await window.UserAuth.register(
                        document.getElementById('reg-email').value,
                        document.getElementById('reg-password').value,
                        document.getElementById('reg-name').value
                    );
                    window.location.href = '/my-collection.html';
                } catch (err) {
                    authError.textContent = err.message;
                    authError.classList.remove('hidden');
                    btn.disabled = false;
                    btn.textContent = 'Create Account';
                }
            });
        });
    </script>
</body>
</html>
